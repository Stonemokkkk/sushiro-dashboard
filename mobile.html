<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a1a">
    <title>壽司郎排隊</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #1a1a1a;
            --red: #e63946;
            --red-dark: #c1121f;
            --white: #ffffff;
            --gray: #f5f5f5;
            --text: #2d2d2d;
            --hk: #e63946;
            --kc: #457b9d;
            --nt: #2a9d8f;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
            background: var(--black);
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: var(--red);
            padding: 6px 12px;
            padding-top: max(6px, env(safe-area-inset-top));
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .logo-icon {
            width: 22px;
            height: 22px;
            background: var(--white);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
        }

        .logo-text {
            font-size: 13px;
            font-weight: 900;
            color: var(--white);
        }

        .time {
            font-size: 12px;
            font-weight: 600;
            color: var(--white);
            opacity: 0.9;
        }

        /* Region Tabs */
        .tabs {
            display: flex;
            background: #222;
            flex-shrink: 0;
        }

        .tab {
            flex: 1;
            padding: 7px 4px;
            border: none;
            background: #333;
            color: #888;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active { color: white; }
        .tab.hk.active { background: var(--hk); }
        .tab.kc.active { background: var(--kc); }
        .tab.nt.active { background: var(--nt); }
        .tab:active { opacity: 0.8; }

        /* Store List - Scrollable */
        .store-list {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
            background: var(--gray);
            padding: 8px;
        }

        /* Store Card */
        .store-card {
            background: var(--white);
            border-radius: 12px;
            margin-bottom: 8px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            position: relative;
        }

        .store-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
        }

        .store-card.hk::before { background: var(--hk); }
        .store-card.kc::before { background: var(--kc); }
        .store-card.nt::before { background: var(--nt); }

        .store-card.tracking {
            border: 2px solid var(--red);
        }

        .tracking-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--red);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 700;
        }

        /* Store Name */
        .store-name {
            font-size: 18px;
            font-weight: 900;
            color: var(--text);
            padding: 12px 14px 6px;
            line-height: 1.2;
        }

        /* Wait Info Row */
        .wait-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 14px 10px;
        }

        .wait-info {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .wait-label {
            font-size: 13px;
            color: #999;
        }

        .wait-number {
            font-size: 42px;
            font-weight: 900;
            line-height: 1;
            color: var(--text);
            font-variant-numeric: tabular-nums;
        }

        .wait-number.busy {
            color: var(--red);
        }

        .wait-unit {
            font-size: 14px;
            color: #999;
        }

        .queue-info {
            text-align: right;
        }

        .queue-number {
            font-size: 36px;
            font-weight: 900;
            line-height: 1;
            color: var(--text);
        }

        .queue-label {
            font-size: 12px;
            color: #999;
        }

        /* Ticket Numbers */
        .tickets {
            background: #f8f8f8;
            padding: 8px 14px;
            display: flex;
            justify-content: center;
            gap: 16px;
            border-top: 1px solid #eee;
        }

        .ticket {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
            font-variant-numeric: tabular-nums;
        }

        .ticket.empty {
            color: #ccc;
            font-weight: 400;
        }

        .ticket-label {
            font-size: 10px;
            color: #999;
            text-align: center;
        }

        /* Tracking Bar */
        .tracking-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--red);
            padding: 8px 12px;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            z-index: 100;
            display: none;
        }

        .tracking-bar.show { display: block; }

        .tracking-bar-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white;
            font-size: 13px;
            font-weight: 600;
        }

        .tracking-bar-store { font-weight: 700; }
        .tracking-bar-divider { opacity: 0.5; }
        .tracking-bar-ticket { font-variant-numeric: tabular-nums; }
        .tracking-bar-status { font-size: 12px; opacity: 0.9; }

        /* Refresh Button */
        .refresh-btn {
            position: fixed;
            bottom: 50px;
            right: 12px;
            width: 44px;
            height: 44px;
            background: var(--red);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            z-index: 90;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .refresh-btn:active { transform: scale(0.9); }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: flex-end;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.show { display: flex; }

        .modal-content {
            background: white;
            border-radius: 16px 16px 0 0;
            width: 100%;
            max-width: 400px;
            animation: slideUp 0.25s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            background: var(--red);
            color: white;
            padding: 10px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title { font-size: 14px; font-weight: 700; }

        .modal-close {
            background: none; border: none; color: white;
            font-size: 18px; cursor: pointer;
        }

        .modal-body { padding: 12px 14px 20px; }

        .modal-current {
            font-size: 12px; color: #666;
            text-align: center; margin-bottom: 10px;
            padding: 6px; background: #f5f5f5; border-radius: 6px;
        }

        .modal-input-group { display: flex; gap: 6px; }

        .modal-input {
            flex: 1; padding: 10px 12px;
            border: 2px solid #e0e0e0; border-radius: 8px;
            font-size: 18px; font-weight: 700;
            text-align: center;
        }

        .modal-input:focus { outline: none; border-color: var(--red); }

        .modal-confirm {
            background: var(--red); color: white; border: none;
            border-radius: 8px; padding: 10px 18px;
            font-size: 15px; font-weight: 700; cursor: pointer;
        }

        .modal-confirm:active { background: var(--red-dark); }

        .modal-saved { text-align: center; padding: 10px 0; }
        .modal-saved-label { font-size: 11px; color: #666; }
        .modal-saved-number { font-size: 32px; font-weight: 900; color: var(--red); }
        .modal-saved-status { font-size: 13px; color: #666; margin: 8px 0; }

        .modal-cancel-btn {
            background: #f5f5f5; color: #666; border: none;
            border-radius: 8px; padding: 10px 20px;
            font-size: 13px; cursor: pointer;
        }

        /* Alert Modal */
        .alert-overlay { background: rgba(0,0,0,0.8); }

        .alert-content { text-align: center; padding: 32px 24px; }

        .alert-icon {
            font-size: 64px; margin-bottom: 16px;
            animation: bounce 0.5s ease infinite alternate;
        }

        @keyframes bounce {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .alert-title {
            font-size: 24px; font-weight: 900;
            color: var(--red); margin-bottom: 8px;
        }

        .alert-message {
            font-size: 16px; color: #666; margin-bottom: 24px;
        }

        .alert-btn {
            background: var(--red); color: white; border: none;
            border-radius: 12px; padding: 14px 32px;
            font-size: 18px; font-weight: 700; cursor: pointer; width: 100%;
        }

        .alert-btn:active { background: var(--red-dark); }

        /* Loading */
        .loading {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100%; gap: 12px;
        }

        .spinner {
            width: 32px; height: 32px;
            border: 3px solid #ddd; border-top-color: var(--red);
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text { font-size: 13px; color: #999; }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo">
            <div class="logo-icon">🍣</div>
            <div class="logo-text">壽司郎</div>
        </div>
        <div class="time" id="currentTime">--:--</div>
    </header>

    <!-- Region Tabs -->
    <div class="tabs">
        <button class="tab active" data-region="all" onclick="filterRegion('all')">全部</button>
        <button class="tab hk" data-region="香港島" onclick="filterRegion('香港島')">香港島</button>
        <button class="tab kc" data-region="九龍" onclick="filterRegion('九龍')">九龍</button>
        <button class="tab nt" data-region="新界" onclick="filterRegion('新界')">新界</button>
    </div>

    <!-- Store List -->
    <div class="store-list" id="storeList">
        <div class="loading">
            <div class="spinner"></div>
            <div class="loading-text">載入中...</div>
        </div>
    </div>

    <!-- Tracking Bar -->
    <div class="tracking-bar" id="trackingBar">
        <div class="tracking-bar-content">
            <span class="tracking-bar-store" id="trackingBarStore">--</span>
            <span class="tracking-bar-divider">|</span>
            <span class="tracking-bar-ticket" id="trackingBarTicket">籌號: --</span>
            <span class="tracking-bar-status" id="trackingBarStatus">--</span>
        </div>
    </div>

    <!-- Refresh Button -->
    <button class="refresh-btn" onclick="refreshData()">🔄</button>

    <!-- Ticket Modal -->
    <div class="modal-overlay" id="ticketModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalStoreName">輸入你嘅籌號</div>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="modal-current" id="modalCurrentTickets">叫緊: --</div>
                <div class="modal-input-group" id="modalInputGroup">
                    <input type="text" class="modal-input" id="ticketInput" placeholder="例如: 162" inputmode="numeric">
                    <button class="modal-confirm" onclick="saveTicket()">確定</button>
                </div>
                <div class="modal-saved" id="modalSaved" style="display:none">
                    <div class="modal-saved-label">你嘅籌號</div>
                    <div class="modal-saved-number" id="modalSavedNumber">--</div>
                    <div class="modal-saved-status" id="modalSavedStatus">--</div>
                    <button class="modal-cancel-btn" onclick="cancelTicket()">取消排隊</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Alert Modal -->
    <div class="modal-overlay alert-overlay" id="alertModal">
        <div class="modal-content alert-content">
            <div class="alert-icon">🔔</div>
            <div class="alert-title" id="alertTitle">差唔多到你啦！</div>
            <div class="alert-message" id="alertMessage">快啲去櫃檯準備入座</div>
            <button class="alert-btn" onclick="closeAlert()">我知道啦</button>
        </div>
    </div>

    <script>
        const CORS_PROXY = 'https://cors.freehi.workers.dev/?';
        const API_BASE = 'https://sushipass.sushiro.com.hk/api/2.0';

        let allStores = [];
        let refreshInterval;
        let countdown = 30;
        let currentStoreId = null;
        let trackedStoreId = null;
        let trackedTicket = null;
        let alertPlayed = false;
        let currentRegion = 'all';

        // Region filter
        function filterRegion(region) {
            currentRegion = region;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-region="${region}"]`).classList.add('active');
            renderList();
        }

        // Render store list
        function renderList() {
            const list = document.getElementById('storeList');
            let filtered = currentRegion === 'all' ? allStores : allStores.filter(s => s.region === currentRegion);

            if (filtered.length === 0) {
                list.innerHTML = '<div class="loading"><div class="loading-text">冇數據</div></div>';
                return;
            }

            list.innerHTML = filtered.map(store => {
                const hasQueue = store.queue_count > 0;
                const hasWait = store.wait > 0;
                const hasTickets = store.tickets && store.tickets.length > 0;
                const isTracking = trackedStoreId === store.id;
                const regionClass = getRegionClass(store.region);

                // Pad tickets to 3
                const tickets = [...(store.tickets || [])];
                while (tickets.length < 3) tickets.push('');

                return `
                    <div class="store-card ${regionClass} ${isTracking ? 'tracking' : ''}" onclick="openModal(${store.id})">
                        ${isTracking ? '<div class="tracking-badge">追蹤中</div>' : ''}
                        <div class="store-name">${store.shop_name}</div>
                        <div class="wait-row">
                            <div class="wait-info">
                                <span class="wait-number ${store.wait > 30 ? 'busy' : ''}">${store.wait}</span>
                                <span class="wait-unit">分</span>
                            </div>
                            <div class="queue-info">
                                <div class="queue-number">${store.queue_count}</div>
                                <div class="queue-label">組等候</div>
                            </div>
                        </div>
                        <div class="tickets">
                            <div>
                                <div class="ticket ${tickets[0] ? '' : 'empty'}">${tickets[0] || '-'}</div>
                                <div class="ticket-label">叫緊</div>
                            </div>
                            <div>
                                <div class="ticket ${tickets[1] ? '' : 'empty'}">${tickets[1] || '-'}</div>
                                <div class="ticket-label">叫緊</div>
                            </div>
                            <div>
                                <div class="ticket ${tickets[2] ? '' : 'empty'}">${tickets[2] || '-'}</div>
                                <div class="ticket-label">叫緊</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getRegionClass(region) {
            if (region === '香港島') return 'hk';
            if (region === '九龍') return 'kc';
            if (region === '新界') return 'nt';
            return '';
        }

        // Update tracking bar
        function updateTrackingBar() {
            const bar = document.getElementById('trackingBar');
            if (!trackedStoreId || !trackedTicket) {
                bar.classList.remove('show');
                return;
            }

            const store = allStores.find(s => s.id === trackedStoreId);
            if (!store) {
                bar.classList.remove('show');
                return;
            }

            bar.classList.add('show');
            document.getElementById('trackingBarStore').textContent = store.shop_name;
            document.getElementById('trackingBarTicket').textContent = '籌號: ' + trackedTicket;

            if (store.tickets && store.tickets.length > 0) {
                const ticketNum = parseInt(trackedTicket);
                const currentTickets = store.tickets.map(t => parseInt(t)).filter(n => !isNaN(n));
                if (currentTickets.length > 0) {
                    const minCurrent = Math.min(...currentTickets);
                    if (ticketNum <= minCurrent) {
                        document.getElementById('trackingBarStatus').textContent = '到你啦！';
                    } else {
                        const diff = ticketNum - minCurrent;
                        document.getElementById('trackingBarStatus').textContent = '仲有 ' + diff + ' 張';
                    }
                } else {
                    document.getElementById('trackingBarStatus').textContent = '等待中';
                }
            } else {
                document.getElementById('trackingBarStatus').textContent = '等待中';
            }
        }

        // Play alert sound
        function playAlertSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                for (let i = 0; i < 3; i++) {
                    setTimeout(() => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.frequency.value = 880;
                        osc.type = 'sine';
                        gain.gain.setValueAtTime(0.3, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                        osc.start(ctx.currentTime);
                        osc.stop(ctx.currentTime + 0.3);
                    }, i * 400);
                }
            } catch (e) {}
        }

        function showAlert(title, message) {
            document.getElementById('alertTitle').textContent = title;
            document.getElementById('alertMessage').textContent = message;
            document.getElementById('alertModal').classList.add('show');
            playAlertSound();
        }

        function closeAlert() {
            document.getElementById('alertModal').classList.remove('show');
        }

        // Modal
        function openModal(storeId) {
            currentStoreId = storeId;
            const store = allStores.find(s => s.id === storeId);
            if (!store) return;

            document.getElementById('modalStoreName').textContent = store.shop_name;
            document.getElementById('modalCurrentTickets').textContent = '叫緊: ' + (store.tickets.length > 0 ? store.tickets.join(', ') : '--');

            if (trackedStoreId === storeId && trackedTicket) {
                document.getElementById('modalInputGroup').style.display = 'none';
                document.getElementById('modalSaved').style.display = 'block';
                document.getElementById('modalSavedNumber').textContent = trackedTicket;
                updateTrackingStatus(store);
            } else {
                document.getElementById('modalInputGroup').style.display = 'flex';
                document.getElementById('modalSaved').style.display = 'none';
                document.getElementById('ticketInput').value = '';
            }

            document.getElementById('ticketModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('ticketModal').classList.remove('show');
            currentStoreId = null;
        }

        function saveTicket() {
            const ticket = document.getElementById('ticketInput').value.trim();
            if (!ticket) return;

            trackedStoreId = currentStoreId;
            trackedTicket = ticket;
            alertPlayed = false;
            saveTrackedTicket();

            document.getElementById('modalInputGroup').style.display = 'none';
            document.getElementById('modalSaved').style.display = 'block';
            document.getElementById('modalSavedNumber').textContent = ticket;

            const store = allStores.find(s => s.id === currentStoreId);
            if (store) updateTrackingStatus(store);

            renderList();
            updateTrackingBar();
            closeModal();
        }

        function cancelTicket() {
            trackedStoreId = null;
            trackedTicket = null;
            alertPlayed = false;
            localStorage.removeItem('sushiro_tracking');
            closeModal();
            renderList();
            updateTrackingBar();
        }

        function updateTrackingStatus(store) {
            const el = document.getElementById('modalSavedStatus');
            if (!store.tickets || store.tickets.length === 0) {
                el.textContent = '暫無籌號資訊';
                return;
            }

            const ticketNum = parseInt(trackedTicket);
            const currentTickets = store.tickets.map(t => parseInt(t)).filter(n => !isNaN(n));
            if (currentTickets.length === 0) {
                el.textContent = '暫無籌號資訊';
                return;
            }

            const minCurrent = Math.min(...currentTickets);
            const maxCurrent = Math.max(...currentTickets);

            if (ticketNum < minCurrent) {
                el.textContent = `仲有 ${minCurrent - ticketNum} 張枱到你`;
            } else if (ticketNum <= maxCurrent) {
                el.textContent = '🎉 到你啦！快啲去！';
                el.style.color = 'var(--red)';
                if (!alertPlayed) {
                    showAlert('到你啦！🎉', '快啲去櫃檯準備入座！');
                    alertPlayed = true;
                    saveTrackedTicket();
                }
            } else {
                el.textContent = '已過號';
            }
        }

        // localStorage
        function loadTrackedTicket() {
            const saved = localStorage.getItem('sushiro_tracking');
            if (saved) {
                const data = JSON.parse(saved);
                trackedStoreId = data.storeId;
                trackedTicket = data.ticket;
                alertPlayed = data.alertPlayed || false;
            }
            updateTrackingBar();
        }

        function saveTrackedTicket() {
            localStorage.setItem('sushiro_tracking', JSON.stringify({
                storeId: trackedStoreId,
                ticket: trackedTicket,
                alertPlayed: alertPlayed
            }));
        }

        // Check tracked tickets
        function checkTrackedTickets() {
            if (!trackedStoreId || !trackedTicket) return;

            const store = allStores.find(s => s.id === trackedStoreId);
            if (!store || !store.tickets || store.tickets.length === 0) return;

            const ticketNum = parseInt(trackedTicket);
            const currentTickets = store.tickets.map(t => parseInt(t)).filter(n => !isNaN(n));
            if (currentTickets.length === 0) return;

            const minCurrent = Math.min(...currentTickets);

            if (ticketNum <= minCurrent + 10 && ticketNum >= minCurrent) {
                if (!alertPlayed) {
                    const diff = minCurrent - ticketNum;
                    if (diff <= 5) {
                        showAlert('差唔多到你啦！🔔', '快啲去櫃檯準備入座！');
                    } else {
                        showAlert('快輪到你啦！📢', `仲有約 ${diff} 張枱到你，準備吓啦！`);
                    }
                    alertPlayed = true;
                    saveTrackedTicket();
                }
            }

            updateTrackingBar();
        }

        // Update time
        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').textContent =
                now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        }

        // Fetch data
        async function fetchData() {
            try {
                const storeListUrl = `${CORS_PROXY}${API_BASE}/info/storelist?latitude=22&longitude=114&numresults=100&region=HK`;
                const storeListResponse = await fetch(storeListUrl);
                const storeListData = await storeListResponse.json();

                allStores = storeListData.map(store => ({
                    shop_name: store.name.replace('店', ''),
                    queue_count: store.waitingGroup || 0,
                    id: store.id,
                    wait: store.wait,
                    status: store.storeStatus,
                    region: store.region || '',
                    tickets: []
                }));

                const regionOrder = { '香港島': 0, '九龍': 1, '新界': 2 };
                allStores.sort((a, b) => {
                    const rd = (regionOrder[a.region] || 3) - (regionOrder[b.region] || 3);
                    return rd !== 0 ? rd : b.queue_count - a.queue_count;
                });

                renderList();
                updateTime();

                // Fetch tickets
                const batchSize = 10;
                for (let i = 0; i < allStores.length; i += batchSize) {
                    const batch = allStores.slice(i, i + batchSize);
                    await Promise.all(batch.map(async (store) => {
                        try {
                            const url = `${CORS_PROXY}${API_BASE}/remote/groupqueues?region=HK&storeid=${store.id}`;
                            const res = await fetch(url);
                            const data = await res.json();
                            store.tickets = data.storeQueue || [];
                        } catch (e) {
                            store.tickets = [];
                        }
                    }));
                }

                renderList();
                checkTrackedTickets();
                console.log(`✅ 載入成功：${allStores.length} 間店舖`);
            } catch (error) {
                console.error('❌ 載入失敗:', error);
                document.getElementById('storeList').innerHTML = '<div class="loading"><div class="loading-text">載入失敗</div></div>';
            }
        }

        function refreshData() {
            countdown = 30;
            fetchData();
        }

        function startAutoRefresh() {
            refreshInterval = setInterval(() => {
                countdown--;
                if (countdown <= 0) refreshData();
            }, 1000);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadTrackedTicket();
            fetchData();
            startAutoRefresh();
            updateTime();
        });
    </script>
</body>
</html>
