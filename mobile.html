<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>壽司郎排隊情況</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-display: #f5f5f5;
            --text-primary: #2d2d2d;
            --text-secondary: #6b6b6b;
            --border-color: #d0d0d0;
            --divider-color: #c0c0c0;
        }

        body {
            background: var(--bg-display);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Main Grid Container */
        .display-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 12px;
            padding-bottom: 60px;
        }

        /* Grid System: 4 columns */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            flex: 1;
            gap: 0;
        }

        /* Column with dotted divider */
        .column {
            display: flex;
            flex-direction: column;
            border-right: 1px dotted var(--divider-color);
            padding: 0 6px;
        }

        .column:last-child {
            border-right: none;
        }

        /* Data Cell Component */
        .data-cell {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4px 2px;
            border-bottom: 1px dotted var(--divider-color);
            min-height: 0;
        }

        .data-cell:last-child {
            border-bottom: none;
        }

        /* Shop Name - left aligned */
        .shop-name {
            font-size: 11px;
            color: var(--text-primary);
            text-align: left;
            line-height: 1.2;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Auto-scaling for long names */
        .shop-name.auto-scale {
            font-size: clamp(8px, 2.2vw, 11px);
        }

        /* Queue Count Row */
        .queue-row {
            display: flex;
            align-items: baseline;
            justify-content: flex-end;
            gap: 1px;
        }

        /* Queue Count Number - right aligned, large font */
        .queue-count {
            font-size: 20px;
            font-weight: 400;
            color: var(--text-primary);
            line-height: 1;
        }

        .queue-count.has-queue {
            font-weight: 700;
        }

        .queue-count.no-queue {
            font-weight: 400;
            color: var(--text-secondary);
        }

        /* Unit "組" - small font, next to number */
        .queue-unit {
            font-size: 10px;
            font-weight: 400;
            color: var(--text-secondary);
        }

        /* Footer Bar */
        .footer-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #3d3d3d;
            color: #ffffff;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .footer-title {
            font-size: 13px;
            font-weight: 500;
        }

        .footer-time {
            font-size: 13px;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
        }

        /* Loading State */
        .loading-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 2px solid var(--border-color);
            border-top-color: var(--text-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Refresh indicator */
        .refresh-indicator {
            position: fixed;
            top: 8px;
            right: 8px;
            font-size: 10px;
            color: var(--text-secondary);
            background: rgba(255,255,255,0.8);
            padding: 4px 8px;
            border-radius: 4px;
        }

        /* Animation */
        .fade-in {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- Refresh Indicator -->
    <div class="refresh-indicator" id="refreshIndicator">30s</div>

    <!-- Main Display Container -->
    <div class="display-container">
        <div class="grid" id="grid">
            <!-- Loading State -->
            <div class="loading-state" id="loadingState">
                <div class="loading-spinner"></div>
                <div class="loading-text">載入中...</div>
            </div>
        </div>
    </div>

    <!-- Footer Bar -->
    <div class="footer-bar">
        <div class="footer-title">壽司郎排隊情況</div>
        <div class="footer-time" id="footerTime">--:--</div>
    </div>

    <script>
        // CORS proxy
        const CORS_PROXY = 'https://cors.freehi.workers.dev/?';
        const API_BASE = 'https://sushipass.sushiro.com.hk/api/2.0';

        // Global variables
        let allStores = [];
        let refreshInterval;
        let countdown = 30;

        // Max shops to display (4 columns x 8 rows = 32)
        const MAX_SHOPS = 32;

        // Create data cell HTML
        function createDataCell(shop) {
            const hasQueue = shop.queue_count > 0;
            const countClass = hasQueue ? 'has-queue' : 'no-queue';

            // Auto-scale for long shop names (more than 6 characters)
            const nameClass = shop.shop_name.length > 6 ? 'auto-scale' : '';

            return `
                <div class="data-cell fade-in">
                    <div class="shop-name ${nameClass}">${shop.shop_name}</div>
                    <div class="queue-row">
                        <span class="queue-count ${countClass}">${shop.queue_count}</span>
                        <span class="queue-unit">組</span>
                    </div>
                </div>
            `;
        }

        // Render grid (4 columns x 8 rows)
        function renderGrid(stores) {
            const grid = document.getElementById('grid');

            if (stores.length === 0) {
                grid.innerHTML = `
                    <div class="loading-state">
                        <div class="loading-text">冇數據</div>
                    </div>
                `;
                return;
            }

            // Split into 4 columns
            const columns = [[], [], [], []];
            stores.forEach((store, index) => {
                columns[index % 4].push(store);
            });

            // Render each column
            grid.innerHTML = columns.map(col => `
                <div class="column">
                    ${col.map(store => createDataCell(store)).join('')}
                </div>
            `).join('');
        }

        // Update footer time
        function updateTime() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('footerTime').textContent = `${hours}:${minutes}`;
        }

        // Fetch data from API
        async function fetchData() {
            try {
                // Show loading
                document.getElementById('grid').innerHTML = `
                    <div class="loading-state">
                        <div class="loading-spinner"></div>
                        <div class="loading-text">載入中...</div>
                    </div>
                `;

                // Fetch store list
                const storeListUrl = `${CORS_PROXY}${API_BASE}/info/storelist?latitude=22&longitude=114&numresults=100&region=HK`;
                const storeListResponse = await fetch(storeListUrl);
                const storeListData = await storeListResponse.json();

                // Transform data to match the design format
                allStores = storeListData.map(store => ({
                    shop_name: store.name.replace('店', ''),
                    queue_count: store.waitingGroup || 0,
                    id: store.id,
                    wait: store.wait,
                    status: store.storeStatus
                }));

                // Sort by queue count (descending) to show busy stores first
                allStores.sort((a, b) => b.queue_count - a.queue_count);

                // Limit to MAX_SHOPS (32)
                allStores = allStores.slice(0, MAX_SHOPS);

                // Render
                renderGrid(allStores);

                // Update time
                updateTime();

                console.log(`✅ 載入成功：${allStores.length} 間店舖`);
            } catch (error) {
                console.error('❌ 載入失敗:', error);
                document.getElementById('grid').innerHTML = `
                    <div class="loading-state">
                        <div class="loading-text">載入失敗</div>
                    </div>
                `;
            }
        }

        // Refresh data
        function refreshData() {
            countdown = 30;
            fetchData();
        }

        // Start auto refresh
        function startAutoRefresh() {
            refreshInterval = setInterval(() => {
                countdown--;
                document.getElementById('refreshIndicator').textContent = `${countdown}s`;

                if (countdown <= 0) {
                    refreshData();
                }
            }, 1000);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            fetchData();
            startAutoRefresh();
            updateTime();
        });
    </script>
</body>
</html>
